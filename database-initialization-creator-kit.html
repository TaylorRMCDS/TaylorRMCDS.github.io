<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Database Initialization Creator Kit</title>
    <link rel="stylesheet" href="database-initialization-creator-kit.css" />
</head>
<body>

<!--  Toolbar  -->
<div id="toolbar" role="toolbar" aria-label="Canvas actions">
  <span class="toolbar-title">DB Init Creator</span>
  <button id="btn-add-table">+ Add Table</button>
  <button id="btn-save-sql">Save SQL</button>
  <button id="btn-clear">Clear Canvas</button>
  <span id="connect-mode-indicator" aria-live="polite">Click a table to connect - Esc to cancel</span>
</div>

<div id="workspace-area">
  <!--  Canvas  -->
  <div id="canvas-container">
    <div id="canvas" role="main" aria-label="Table canvas">
      <svg id="svg-overlay" aria-hidden="true">
        <defs>
          <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="var(--color-connector)" />
          </marker>
          <marker id="arrowhead-selected" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="var(--color-connector-selected)" />
          </marker>
        </defs>
      </svg>
    </div>
  </div>

  <!--  Right Field Pane  -->
  <aside id="field-pane" aria-label="Field list pane">
    <h2 class="field-pane-title">Field Staging List</h2>

    <div class="field-pane-section">
      <label for="single-field-input" class="field-pane-label">Add one field</label>
      <div class="field-pane-inline-input">
        <input id="single-field-input" type="text" placeholder="e.g. customer_email" aria-label="Field name" />
        <button id="btn-add-pane-field" type="button">Add</button>
      </div>
    </div>

    <div class="field-pane-section">
      <label for="bulk-field-input" class="field-pane-label">Paste multiple fields (one per line)</label>
      <textarea id="bulk-field-input" rows="6" placeholder="first_name&#10;last_name&#10;email" aria-label="Bulk field input"></textarea>
      <button id="btn-add-bulk-fields" type="button">Add Lines</button>
    </div>

    <div class="field-pane-section field-pane-list-wrap">
      <p class="field-pane-label">Fields</p>
      <ul id="pane-field-list" aria-label="Field tiles"></ul>
    </div>
  </aside>
</div>

<!--  Relationship Type Modal  -->
<div id="rel-modal-overlay" role="dialog" aria-modal="true" aria-labelledby="rel-modal-title">
  <div id="rel-modal">
    <h2 id="rel-modal-title">Choose Relationship Type</h2>
    <div class="rel-options">
      <button class="rel-option-btn" data-type="one_to_one">One-to-One  (1 : 1)</button>
      <button class="rel-option-btn" data-type="one_to_many">One-to-Many  (1 : N)</button>
      <button class="rel-option-btn" data-type="many_to_one">Many-to-One  (N : 1)</button>
      <button class="rel-option-btn" data-type="many_to_many">Many-to-Many  (N : N)</button>
    </div>
    <button id="rel-modal-cancel">Cancel</button>
  </div>
</div>

<!--  SQL Output Modal  -->
<div id="sql-modal-overlay" role="dialog" aria-modal="true" aria-labelledby="sql-modal-title">
  <div id="sql-modal">
    <h2 id="sql-modal-title">Generated SQL</h2>
    <textarea id="sql-output" readonly aria-label="Generated SQL script"></textarea>
    <div class="sql-modal-actions">
      <button id="btn-download-sql">Download .sql</button>
      <button id="btn-close-sql">Close</button>
    </div>
  </div>
</div>

<!--  Connector Delete Button  -->
<button id="connector-delete-btn" aria-label="Delete relationship">Delete Relationship</button>

<!--  Error Toast  -->
<div id="error-toast" role="alert" aria-live="assertive"></div>

<script src="database-initialization-creator-kit.js"></script>
</body>
</html>
